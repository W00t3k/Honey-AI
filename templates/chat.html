<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #222;
            --border: rgba(255,255,255,0.08);
            --text: #e8e8e8;
            --text-muted: #888;
            --accent: #7c6af7;
            --accent-hover: #9181ff;
            --user-bg: #1e1b3a;
            --code-bg: #111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--accent), #c06af7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .model-badge {
            font-size: 11px;
            background: rgba(124,106,247,0.15);
            color: var(--accent);
            border: 1px solid rgba(124,106,247,0.25);
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .new-chat-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .new-chat-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        /* ── Chat area ── */
        .chat-wrapper {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .chat-wrapper::-webkit-scrollbar { width: 4px; }
        .chat-wrapper::-webkit-scrollbar-track { background: transparent; }
        .chat-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .chat-inner {
            max-width: 760px;
            margin: 0 auto;
            padding: 32px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* ── Welcome ── */
        .welcome {
            text-align: center;
            padding: 48px 20px 16px;
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), #c06af7);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }

        .welcome h2 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 32px;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 520px;
            margin: 0 auto;
        }

        @media (max-width: 500px) {
            .suggestions { grid-template-columns: 1fr; }
        }

        .suggestion {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
            font-size: 13px;
            color: var(--text);
            line-height: 1.4;
        }

        .suggestion:hover {
            border-color: var(--accent);
            background: rgba(124,106,247,0.05);
        }

        .suggestion .s-icon {
            font-size: 16px;
            margin-bottom: 6px;
            display: block;
        }

        /* ── Messages ── */
        .message {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-avatar.user {
            background: var(--user-bg);
            border: 1px solid rgba(124,106,247,0.3);
        }

        .msg-avatar.assistant {
            background: linear-gradient(135deg, var(--accent), #c06af7);
        }

        .msg-body {
            flex: 1;
            min-width: 0;
            font-size: 15px;
            line-height: 1.65;
        }

        .msg-role {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .msg-content {
            color: var(--text);
            word-break: break-word;
        }

        /* Markdown rendering */
        .msg-content p { margin-bottom: 12px; }
        .msg-content p:last-child { margin-bottom: 0; }

        .msg-content pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            overflow-x: auto;
            margin: 12px 0;
            position: relative;
        }

        .msg-content pre code {
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            color: #e2e8f0;
            background: none;
            padding: 0;
        }

        .msg-content code {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            background: rgba(255,255,255,0.06);
            padding: 2px 6px;
            border-radius: 4px;
            color: #a5b4fc;
        }

        .msg-content ul, .msg-content ol {
            padding-left: 20px;
            margin-bottom: 12px;
        }

        .msg-content li { margin-bottom: 4px; }

        .msg-content strong { font-weight: 600; }
        .msg-content em { font-style: italic; color: rgba(232,232,232,0.85); }

        .msg-content h1, .msg-content h2, .msg-content h3 {
            font-weight: 600;
            margin: 16px 0 8px;
            letter-spacing: -0.3px;
        }

        .msg-content h1 { font-size: 20px; }
        .msg-content h2 { font-size: 17px; }
        .msg-content h3 { font-size: 15px; }

        .msg-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 14px;
            color: var(--text-muted);
            margin: 10px 0;
        }

        /* Cursor blink during streaming */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent);
            margin-left: 1px;
            vertical-align: text-bottom;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* ── Typing indicator ── */
        .typing-row {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 10px 0 4px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.4s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.2s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Input area ── */
        .input-area {
            flex-shrink: 0;
            padding: 16px 20px 20px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .input-wrap {
            max-width: 760px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 12px 10px 16px;
            transition: border-color 0.15s;
        }

        .input-wrap:focus-within {
            border-color: rgba(124,106,247,0.4);
        }

        .input-box {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            line-height: 1.5;
            min-height: 24px;
            max-height: 180px;
            outline: none;
        }

        .input-box::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 34px;
            height: 34px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: rgba(124,106,247,0.25);
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg { width: 16px; height: 16px; }

        .disclaimer {
            text-align: center;
            font-size: 11.5px;
            color: var(--text-muted);
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">
        <div class="logo-icon">✦</div>
        AI Assistant
        <span class="model-badge">Advanced AI</span>
    </div>
    <div class="header-right">
        <button class="new-chat-btn" onclick="newChat()">New chat</button>
    </div>
</header>

<div class="chat-wrapper" id="chat-wrapper">
    <div class="chat-inner" id="chat-inner">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">✦</div>
            <h2>How can I help you?</h2>
            <p>Ask me anything — coding, writing, analysis, research, and more.</p>
            <div class="suggestions">
                <button class="suggestion" onclick="suggest(this)">
                    <span class="s-icon">💻</span>
                    Write a Python script to parse JSON logs
                </button>
                <button class="suggestion" onclick="suggest(this)">
                    <span class="s-icon">🔐</span>
                    Explain common API authentication patterns
                </button>
                <button class="suggestion" onclick="suggest(this)">
                    <span class="s-icon">🧠</span>
                    How do large language models work?
                </button>
                <button class="suggestion" onclick="suggest(this)">
                    <span class="s-icon">🔍</span>
                    What are best practices for securing an API?
                </button>
            </div>
        </div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrap">
        <textarea
            id="input"
            class="input-box"
            placeholder="Ask anything..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="send()" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"/>
                <polyline points="5 12 12 5 19 12"/>
            </svg>
        </button>
    </div>
    <p class="disclaimer">AI can make mistakes. Verify important information.</p>
</div>

<script>
    const chatInner = document.getElementById('chat-inner');
    const chatWrapper = document.getElementById('chat-wrapper');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    let history = [];
    let busy = false;

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 180) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    }

    function suggest(btn) {
        // Get text without the icon span
        const text = btn.innerText.trim().replace(/^[^\s]+\s+/, '');
        input.value = text;
        autoResize(input);
        send();
    }

    function newChat() {
        history = [];
        busy = false;
        sendBtn.disabled = false;
        chatInner.innerHTML = '';
        const welcome = document.createElement('div');
        welcome.className = 'welcome';
        welcome.id = 'welcome';
        welcome.innerHTML = `
            <div class="welcome-icon">✦</div>
            <h2>How can I help you?</h2>
            <p>Ask me anything — coding, writing, analysis, research, and more.</p>
            <div class="suggestions">
                <button class="suggestion" onclick="suggest(this)"><span class="s-icon">💻</span>Write a Python script to parse JSON logs</button>
                <button class="suggestion" onclick="suggest(this)"><span class="s-icon">🔐</span>Explain common API authentication patterns</button>
                <button class="suggestion" onclick="suggest(this)"><span class="s-icon">🧠</span>How do large language models work?</button>
                <button class="suggestion" onclick="suggest(this)"><span class="s-icon">🔍</span>What are best practices for securing an API?</button>
            </div>`;
        chatInner.appendChild(welcome);
        input.value = '';
        autoResize(input);
        input.focus();
    }

    function removeWelcome() {
        const w = document.getElementById('welcome');
        if (w) w.remove();
    }

    function appendMessage(role, content) {
        removeWelcome();
        const row = document.createElement('div');
        row.className = 'message';

        const avatar = document.createElement('div');
        avatar.className = `msg-avatar ${role}`;
        avatar.textContent = role === 'user' ? '👤' : '✦';

        const body = document.createElement('div');
        body.className = 'msg-body';

        const roleLabel = document.createElement('div');
        roleLabel.className = 'msg-role';
        roleLabel.textContent = role === 'user' ? 'You' : 'Assistant';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'msg-content';
        contentDiv.innerHTML = role === 'user' ? escapeHtml(content) : renderMarkdown(content);

        body.appendChild(roleLabel);
        body.appendChild(contentDiv);
        row.appendChild(avatar);
        row.appendChild(body);
        chatInner.appendChild(row);
        scrollToBottom();
        return contentDiv;
    }

    function showTyping() {
        removeWelcome();
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typing';

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar assistant';
        avatar.textContent = '✦';

        const dots = document.createElement('div');
        dots.className = 'typing-dots';
        dots.innerHTML = '<span></span><span></span><span></span>';

        row.appendChild(avatar);
        row.appendChild(dots);
        chatInner.appendChild(row);
        scrollToBottom();
    }

    function removeTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    function scrollToBottom() {
        chatWrapper.scrollTop = chatWrapper.scrollHeight;
    }

    // ── Send ──────────────────────────────────────────────────────────
    async function send() {
        const text = input.value.trim();
        if (!text || busy) return;

        busy = true;
        sendBtn.disabled = true;
        input.value = '';
        autoResize(input);

        history.push({ role: 'user', content: text });
        appendMessage('user', text);
        showTyping();

        try {
            const resp = await fetch('/ui/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: history }),
            });

            removeTyping();

            const contentDiv = appendMessage('assistant', '');
            // Add blinking cursor while streaming
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            contentDiv.appendChild(cursor);

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let raw = '';
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // keep incomplete line

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const payload = line.slice(6).trim();
                    if (payload === '[DONE]') break;
                    try {
                        const chunk = JSON.parse(payload);
                        const delta = chunk?.choices?.[0]?.delta?.content;
                        if (delta) {
                            raw += delta;
                            // Re-render with cursor at end
                            contentDiv.innerHTML = renderMarkdown(raw);
                            const c2 = document.createElement('span');
                            c2.className = 'cursor';
                            contentDiv.appendChild(c2);
                            scrollToBottom();
                        }
                    } catch (_) {}
                }
            }

            // Final render without cursor
            contentDiv.innerHTML = renderMarkdown(raw);
            history.push({ role: 'assistant', content: raw });

        } catch (err) {
            removeTyping();
            appendMessage('assistant', 'Sorry, there was a connection error. Please try again.');
        }

        busy = false;
        sendBtn.disabled = false;
        input.focus();
    }

    // ── Markdown renderer ─────────────────────────────────────────────
    function renderMarkdown(text) {
        if (!text) return '';

        // Escape HTML first
        let out = text;

        // Protect code blocks before other processing
        const codeBlocks = [];
        out = out.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
            const idx = codeBlocks.length;
            const langLabel = lang ? `<span style="font-size:11px;color:#888;float:right;margin-top:-2px">${escapeHtml(lang)}</span>` : '';
            codeBlocks.push(`<pre>${langLabel}<code>${escapeHtml(code.trim())}</code></pre>`);
            return `\x00CODE${idx}\x00`;
        });

        // Inline code
        out = out.replace(/`([^`\n]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);

        // Headers
        out = out.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        out = out.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        out = out.replace(/^# (.+)$/gm, '<h1>$1</h1>');

        // Bold and italic
        out = out.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
        out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        out = out.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');

        // Blockquote
        out = out.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

        // Unordered lists
        out = out.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
        out = out.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

        // Ordered lists
        out = out.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

        // Horizontal rule
        out = out.replace(/^---+$/gm, '<hr style="border-color:rgba(255,255,255,0.1);margin:14px 0">');

        // Paragraphs (double newline → paragraph break)
        out = out.replace(/\n\n+/g, '</p><p>');
        out = '<p>' + out + '</p>';

        // Single newlines inside paragraphs
        out = out.replace(/([^>])\n([^<])/g, '$1<br>$2');

        // Restore code blocks
        out = out.replace(/\x00CODE(\d+)\x00/g, (_, i) => codeBlocks[parseInt(i)]);

        // Clean up empty paragraphs
        out = out.replace(/<p>\s*<\/p>/g, '');
        out = out.replace(/<p>(<h[1-3]>)/g, '$1');
        out = out.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
        out = out.replace(/<p>(<pre>)/g, '$1');
        out = out.replace(/(<\/pre>)<\/p>/g, '$1');
        out = out.replace(/<p>(<ul>)/g, '$1');
        out = out.replace(/(<\/ul>)<\/p>/g, '$1');
        out = out.replace(/<p>(<blockquote>)/g, '$1');
        out = out.replace(/(<\/blockquote>)<\/p>/g, '$1');
        out = out.replace(/<p>(<hr[^>]*>)<\/p>/g, '$1');

        return out;
    }

    function escapeHtml(s) {
        return s
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Focus input on load
    input.focus();
</script>
</body>
</html>
