# OpenAI API Honeypot - Nginx Configuration
#
# Copy to: /etc/nginx/sites-available/honeypot
# Enable:  ln -s /etc/nginx/sites-available/honeypot /etc/nginx/sites-enabled/
# Test:    nginx -t
# Reload:  systemctl reload nginx
#
# After setup, run: certbot --nginx -d api.yourdomain.com

# Rate limiting zone (optional, disable if you want to capture all traffic)
# limit_req_zone $binary_remote_addr zone=honeypot:10m rate=100r/s;

upstream honeypot {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;  # Change to your domain

    # Redirect HTTP to HTTPS (certbot will modify this)
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourdomain.com;  # Change to your domain

    # SSL configuration (certbot will add certificates)
    # ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers (mimic real API gateway)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;

    # Logging
    access_log /var/log/nginx/honeypot_access.log;
    error_log /var/log/nginx/honeypot_error.log;

    # Max request size (for large prompts)
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;  # Longer for streaming responses

    # Rate limiting (uncomment to enable)
    # limit_req zone=honeypot burst=50 nodelay;

    # Main proxy configuration
    location / {
        proxy_pass http://honeypot;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Buffering settings for streaming
        proxy_buffering off;
        proxy_cache off;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    # Admin dashboard (optionally restrict by IP)
    location /admin {
        # Uncomment to restrict admin access by IP
        # allow 1.2.3.4;  # Your IP
        # deny all;

        proxy_pass http://honeypot;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Static files
    location /static {
        proxy_pass http://honeypot;
        proxy_http_version 1.1;

        # Cache static files
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (for monitoring)
    location /health {
        proxy_pass http://honeypot;
        proxy_http_version 1.1;
        access_log off;
    }

    # Block common scanner paths (optional - or let them through for logging)
    # location ~ /\.(git|env|htaccess|htpasswd) {
    #     deny all;
    # }
}

# Optional: Catch-all server block for any domain pointing to this IP
# This captures scanners hitting the IP directly
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    server_name _;

    # Self-signed cert for catch-all (generate with:)
    # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout /etc/nginx/ssl/selfsigned.key \
    #   -out /etc/nginx/ssl/selfsigned.crt \
    #   -subj "/CN=localhost"
    # ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    # ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    location / {
        proxy_pass http://honeypot;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Additional high-signal AI/agent ports.
# These are intentionally curated to look like realistic AI infrastructure.
server {
    listen 3000;
    listen 5000;
    listen 7860;
    listen 8000;
    listen 8080;
    listen 8888;
    listen 9000;
    listen 11434;
    server_name _;

    access_log /var/log/nginx/honeypot_alt_access.log;
    error_log /var/log/nginx/honeypot_alt_error.log;

    location / {
        proxy_pass http://honeypot;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }
}
